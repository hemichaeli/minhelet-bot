<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול פגישה — מינהלת</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #1a1a1a;
    }
    .logo {
      margin-bottom: 24px;
      text-align: center;
    }
    .logo h1 {
      font-size: 1.6rem;
      color: #1b4332;
      font-weight: 700;
    }
    .logo p {
      color: #555;
      font-size: 0.9rem;
      margin-top: 4px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 1.1rem;
      color: #1b4332;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8f5e9;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 0.95rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #666; }
    .info-value { font-weight: 600; color: #1a1a1a; }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .status-confirmed { background: #e8f5e9; color: #2e7d32; }
    .status-pending { background: #fff3e0; color: #e65100; }
    .status-cancelled { background: #fce4ec; color: #c62828; }
    .status-rescheduled { background: #e3f2fd; color: #1565c0; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity 0.2s, transform 0.1s;
      text-align: center;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-confirm { background: #2d6a4f; color: white; }
    .btn-reschedule { background: #1565c0; color: white; }
    .btn-cancel { background: #f5f5f5; color: #c62828; border: 1px solid #ffcdd2; }
    .btn-confirm:hover:not(:disabled) { background: #1b4332; }
    .btn-reschedule:hover:not(:disabled) { background: #0d47a1; }
    .btn-cancel:hover:not(:disabled) { background: #ffebee; }
    .slots-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .slot-btn {
      padding: 12px 8px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      text-align: center;
      font-size: 0.9rem;
      transition: all 0.2s;
      color: #1a1a1a;
    }
    .slot-btn:hover { border-color: #2d6a4f; background: #e8f5e9; }
    .slot-btn.selected { border-color: #2d6a4f; background: #2d6a4f; color: white; }
    .slot-date { font-weight: 700; font-size: 0.85rem; }
    .slot-time { font-size: 1rem; font-weight: 600; margin-top: 2px; }
    .section-title {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .alert {
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }
    .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .alert-error { background: #fce4ec; color: #c62828; border: 1px solid #ef9a9a; }
    .alert-info { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #2d6a4f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .confirm-btn-row { margin-top: 16px; }
    .no-slots { text-align: center; color: #888; padding: 20px; font-size: 0.9rem; }
    footer {
      margin-top: 24px;
      text-align: center;
      color: #aaa;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<div class="logo">
  <h1>🏢 מינהלת</h1>
  <p>ניהול פגישה</p>
</div>

<!-- Loading state -->
<div id="loading" class="card loading">
  <div class="spinner"></div>
  <p>טוען פרטי פגישה...</p>
</div>

<!-- Error state -->
<div id="error-state" class="card hidden">
  <div class="alert alert-error" id="error-msg">שגיאה בטעינת הפגישה.</div>
</div>

<!-- Success state (after action) -->
<div id="success-state" class="card hidden">
  <div class="alert alert-success" id="success-msg">הפעולה בוצעה בהצלחה!</div>
</div>

<!-- Main appointment card -->
<div id="main-card" class="card hidden">
  <h2>📅 פרטי הפגישה שלך</h2>
  <div class="info-row">
    <span class="info-label">שם</span>
    <span class="info-value" id="appt-name">—</span>
  </div>
  <div class="info-row">
    <span class="info-label">בניין</span>
    <span class="info-value" id="appt-building">—</span>
  </div>
  <div class="info-row">
    <span class="info-label">תאריך ושעה</span>
    <span class="info-value" id="appt-datetime">—</span>
  </div>
  <div class="info-row">
    <span class="info-label">סוג פגישה</span>
    <span class="info-value" id="appt-type">—</span>
  </div>
  <div class="info-row">
    <span class="info-label">סטטוס</span>
    <span id="appt-status-badge" class="status-badge status-pending">ממתין לאישור</span>
  </div>
</div>

<!-- Actions card -->
<div id="actions-card" class="card hidden">
  <h2>⚡ פעולות</h2>
  <div id="alert-area"></div>
  <button class="btn btn-confirm" id="btn-confirm" onclick="confirmAppointment()">✅ אשר הגעה לפגישה</button>
  <button class="btn btn-reschedule" id="btn-reschedule" onclick="showReschedule()">🔄 בקש לתאם מחדש</button>
  <button class="btn btn-cancel" id="btn-cancel" onclick="cancelAppointment()">❌ ביטול פגישה</button>
</div>

<!-- Reschedule card -->
<div id="reschedule-card" class="card hidden">
  <h2>🗓️ בחר מועד חדש</h2>
  <p class="section-title">המועדים הפנויים הקרובים:</p>
  <div id="slots-grid" class="slots-grid">
    <div class="no-slots">טוען מועדים...</div>
  </div>
  <div class="confirm-btn-row">
    <button class="btn btn-confirm" id="btn-confirm-reschedule" onclick="confirmReschedule()" disabled>אשר מועד חדש</button>
    <button class="btn btn-cancel" onclick="hideReschedule()">חזור</button>
  </div>
</div>

<footer>מינהלת — מערכת תיאום פגישות</footer>

<script>
const API_BASE = 'https://minhelet-bot-production.up.railway.app';
let appointmentToken = null;
let appointmentData = null;
let selectedSlotId = null;

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  appointmentToken = params.get('token');

  if (!appointmentToken) {
    showError('קישור לא תקין — חסר מזהה פגישה.');
    return;
  }

  await loadAppointment();
});

// ── Load appointment ──────────────────────────────────────────────────────────
async function loadAppointment() {
  try {
    const res = await fetch(`${API_BASE}/api/appointments/by-token/${appointmentToken}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showError(err.error || 'לא נמצאה פגישה עם הקישור הזה.');
      return;
    }
    appointmentData = await res.json();
    renderAppointment();
  } catch (e) {
    showError('שגיאה בחיבור לשרת. נסה שוב מאוחר יותר.');
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAppointment() {
  const a = appointmentData;
  document.getElementById('appt-name').textContent = a.lead_name || '—';
  document.getElementById('appt-building').textContent = a.building_name || a.building_id || '—';
  document.getElementById('appt-datetime').textContent = a.slot_datetime
    ? formatDatetime(a.slot_datetime)
    : 'טרם נקבע';

  const typeMap = { signing: 'כנס חתימות', appraisal: 'שמאות', measurement: 'מדידה', other: 'אחר' };
  document.getElementById('appt-type').textContent = typeMap[a.activity_type] || a.activity_type || '—';

  const statusBadge = document.getElementById('appt-status-badge');
  const statusMap = {
    pending:     { label: 'ממתין לאישור', cls: 'status-pending' },
    confirmed:   { label: 'מאושר ✅',     cls: 'status-confirmed' },
    arrived:     { label: 'הגיע ✅',       cls: 'status-confirmed' },
    'no-show':   { label: 'לא הגיע ❌',   cls: 'status-cancelled' },
    rescheduled: { label: 'תואם מחדש 🔄', cls: 'status-rescheduled' },
    cancelled:   { label: 'בוטל ❌',      cls: 'status-cancelled' },
  };
  const s = statusMap[a.status] || { label: a.status, cls: 'status-pending' };
  statusBadge.textContent = s.label;
  statusBadge.className = `status-badge ${s.cls}`;

  // Disable actions if already cancelled/arrived
  if (a.status === 'cancelled' || a.status === 'arrived' || a.status === 'no-show') {
    document.getElementById('btn-confirm').disabled = true;
    document.getElementById('btn-reschedule').disabled = true;
    document.getElementById('btn-cancel').disabled = true;
  }

  hide('loading');
  show('main-card');
  show('actions-card');
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function confirmAppointment() {
  if (!confirm('לאשר הגעה לפגישה?')) return;
  setLoading(true);
  try {
    const res = await fetch(`${API_BASE}/api/appointments/by-token/${appointmentToken}/confirm`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }
    });
    const data = await res.json();
    if (res.ok) {
      showAlert('success', '✅ הפגישה אושרה! נשמח לראותך.');
      appointmentData.status = 'confirmed';
      renderAppointment();
    } else {
      showAlert('error', data.error || 'שגיאה באישור הפגישה.');
    }
  } catch (e) {
    showAlert('error', 'שגיאה בחיבור לשרת.');
  }
  setLoading(false);
}

async function cancelAppointment() {
  if (!confirm('האם אתה בטוח שברצונך לבטל את הפגישה?')) return;
  setLoading(true);
  try {
    const res = await fetch(`${API_BASE}/api/appointments/by-token/${appointmentToken}/cancel`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }
    });
    const data = await res.json();
    if (res.ok) {
      showAlert('success', '❌ הפגישה בוטלה. ניצור איתך קשר לתיאום מחדש אם יהיה צורך.');
      appointmentData.status = 'cancelled';
      renderAppointment();
    } else {
      showAlert('error', data.error || 'שגיאה בביטול הפגישה.');
    }
  } catch (e) {
    showAlert('error', 'שגיאה בחיבור לשרת.');
  }
  setLoading(false);
}

async function showReschedule() {
  show('reschedule-card');
  document.getElementById('slots-grid').innerHTML = '<div class="no-slots">טוען מועדים פנויים...</div>';
  selectedSlotId = null;
  document.getElementById('btn-confirm-reschedule').disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/appointments/slots/available?activityId=${appointmentData.activity_id || ''}`);
    const data = await res.json();
    const slots = data.slots || [];

    if (slots.length === 0) {
      document.getElementById('slots-grid').innerHTML = '<div class="no-slots">אין מועדים פנויים כרגע. אנא פנה אלינו ישירות.</div>';
      return;
    }

    document.getElementById('slots-grid').innerHTML = slots.slice(0, 8).map(s => `
      <div class="slot-btn" onclick="selectSlot(this, ${s.id})" data-slot-id="${s.id}">
        <div class="slot-date">${formatDate(s.slot_date)}</div>
        <div class="slot-time">${s.slot_time ? s.slot_time.substring(0,5) : ''}</div>
        ${s.label ? `<div style="font-size:0.75rem;color:#888;margin-top:2px">${s.label}</div>` : ''}
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('slots-grid').innerHTML = '<div class="no-slots">שגיאה בטעינת המועדים.</div>';
  }
}

function selectSlot(el, slotId) {
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedSlotId = slotId;
  document.getElementById('btn-confirm-reschedule').disabled = false;
}

async function confirmReschedule() {
  if (!selectedSlotId) return;
  if (!confirm('לאשר את המועד החדש שבחרת?')) return;
  setLoading(true);
  try {
    const res = await fetch(`${API_BASE}/api/appointments/by-token/${appointmentToken}/reschedule`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slot_id: selectedSlotId })
    });
    const data = await res.json();
    if (res.ok) {
      showAlert('success', '🔄 הפגישה תואמה מחדש! נשלח לך אישור בקרוב.');
      appointmentData.status = 'rescheduled';
      appointmentData.slot_datetime = data.slot_datetime;
      hide('reschedule-card');
      renderAppointment();
    } else {
      showAlert('error', data.error || 'שגיאה בתיאום מחדש.');
    }
  } catch (e) {
    showAlert('error', 'שגיאה בחיבור לשרת.');
  }
  setLoading(false);
}

function hideReschedule() {
  hide('reschedule-card');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatDate(dateStr) {
  const days = ['א׳', 'ב׳', 'ג׳', 'ד׳', 'ה׳', 'ו׳', 'ש׳'];
  const d = new Date(dateStr);
  return `יום ${days[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
}

function formatDatetime(dt) {
  const d = new Date(dt);
  const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const time = d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  return `יום ${days[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} בשעה ${time}`;
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function showError(msg) {
  hide('loading');
  document.getElementById('error-msg').textContent = msg;
  show('error-state');
}

function showAlert(type, msg) {
  const area = document.getElementById('alert-area');
  area.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => { area.innerHTML = ''; }, 6000);
}

function setLoading(on) {
  ['btn-confirm','btn-reschedule','btn-cancel','btn-confirm-reschedule'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = on;
  });
}
</script>
</body>
</html>
